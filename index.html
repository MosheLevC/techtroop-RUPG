<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="controller.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>RUPG Project</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="image-circle">
          <img src="https://placehold.net/avatar-4.png" alt="Placeholder avatar" />
        </div>
        <div class="user-details placeholder-details">
          <h1 class="user-name placeholder-text">Random User API Name</h1>
          <p class="user-location placeholder-text">Random User API Location</p>
        </div>
      </header>
      <div class="column">
        <div class="about">
          <h2>About me</h2>
          <p class="about-text placeholder-text">About text generated using the Bacon Ipsum API.</p>
        </div>
        <div class="friends">
          <h2>Friends</h2>
          <div class="friends-list placeholder-text">Friends list generated using the Random User API.</div>
        </div>
      </div>
      <div class="column">
        <div class="quote">
          <h2>Favorite quote</h2>
          <div class="quote-container placeholder-text">Quote generated using the Kanye Rest API.</div>
        </div>
        <div class="pokemon">
          <h2>Favorite Pokemon</h2>
          <div class="pokemon-container placeholder-text">Favorite Pokemon generated using the PokeAPI.</div>
        </div>
        <div class="controls-container">
          <div class="action-row">
            <button class="generate-button">Generate User</button>
            <button class="save-button" aria-label="Save User Page">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
            </button>
          </div>
          <div class="load-row">
            <select class="user-select">
              <option value="" disabled selected>Select a saved user...</option>
            </select>
            <button class="load-button">Load</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
