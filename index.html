<!doctype html>
<html lang="en">
  <head>

    <script src="controller.js"></script>
    <link rel="stylesheet" href="styles.css"></link>
    <title>RUPG Project</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="image-circle">

      </header>
      <div class="column">
        <div class="about">
          <h2>About me</h2>

        <div class="friends">
          <h2>Friends</h2>
        </div>
